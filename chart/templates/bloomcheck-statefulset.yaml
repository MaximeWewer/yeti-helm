{{- if .Values.bloomcheck.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "yeti.bloomcheck.fullname" . }}
  labels:
    app.kubernetes.io/component: bloomcheck
    {{- include "yeti.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "yeti.bloomcheck.fullname" . }}
  selector:
    matchLabels:
      app.kubernetes.io/component: bloomcheck
      {{- include "yeti.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: bloomcheck
        {{- include "yeti.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "yeti.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: bloomcheck
          image: {{ include "yeti.image" (dict "img" .Values.bloomcheck.image "root" .) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/bloomcheck", "-serve", "/bloomfilters"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.bloomcheck.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.bloomcheck.resources | nindent 12 }}
          volumeMounts:
            - name: bloomfilters
              mountPath: /bloomfilters
      {{- with .Values.bloomcheck.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.bloomcheck.persistence.enabled }}
      volumes:
        - name: bloomfilters
          emptyDir: {}
      {{- end }}
  {{- if .Values.bloomcheck.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: bloomfilters
      spec:
        accessModes:
          {{- toYaml .Values.bloomcheck.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.bloomcheck.persistence.size | quote }}
        {{- with .Values.bloomcheck.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
{{- end }}
