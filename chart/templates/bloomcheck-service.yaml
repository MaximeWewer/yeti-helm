{{- if .Values.bloomcheck.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "yeti.bloomcheck.fullname" . }}
  labels:
    app.kubernetes.io/component: bloomcheck
    {{- include "yeti.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.bloomcheck.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/component: bloomcheck
    {{- include "yeti.selectorLabels" . | nindent 4 }}
{{- end }}
