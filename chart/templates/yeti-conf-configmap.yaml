{{- if .Values.config.yetiConf }}
# Source for the merged /app/yeti.conf. The merge-yeti-conf initContainer reads
# both keys (base first, then overlay) so overlay values win per key.
#   base.conf    -> tunable sections generated from config.* (auth/rbac/events/proxy)
#   overlay.conf -> user-supplied config.yetiConf (raw INI, à la yeti.conf.sample)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yeti.confName" . }}
  labels:
    {{- include "yeti.labels" . | nindent 4 }}
data:
  base.conf: |
{{ include "yeti.baseConf" . | indent 4 }}
  overlay.conf: |
{{ .Values.config.yetiConf | indent 4 }}
{{- end }}
