{{- with .Values.config.yetiConf }}
# User-supplied yeti.conf (INI, see yeti.conf.sample). Mounted at /app/yeti.conf
# on the yeti app workloads (api/tasks/events/beats/agents) via subPath.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yeti.confName" $ }}
  labels:
    {{- include "yeti.labels" $ | nindent 4 }}
data:
  yeti.conf: |
{{ . | indent 4 }}
{{- end }}
