{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "yeti.fullname" . }}
  labels:
    {{- include "yeti.labels" . | nindent 4 }}
spec:
  # Applies to the Yeti app pods only (redis subchart / arango operator manage their own).
  podSelector:
    matchLabels:
      {{- include "yeti.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Frontend: from declared sources (e.g. ingress controller namespace).
    {{- with .Values.networkPolicy.frontendAllowedFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.frontend.containerPort }}
    {{- end }}
    # Intra-app: workers/frontend -> api; api -> bloomcheck.
    - from:
        - podSelector:
            matchLabels:
              {{- include "yeti.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.port }}
        {{- if .Values.bloomcheck.enabled }}
        - protocol: TCP
          port: {{ .Values.bloomcheck.service.port }}
        {{- end }}
        {{- if .Values.agents.enabled }}
        - protocol: TCP
          port: {{ .Values.agents.service.port }}
        {{- end }}
    {{- if and .Values.metrics.enabled (or (include "yeti.metrics.frontend" .) (include "yeti.metrics.celery" .)) }}
    # Scrape traffic to the chart-managed exporters (ArangoDB/Redis pods are not
    # selected by this policy — they carry the operator/subchart labels).
    - from:
        {{- if .Values.metrics.networkPolicy.allowedFrom }}
        {{- toYaml .Values.metrics.networkPolicy.allowedFrom | nindent 8 }}
        {{- else }}
        - podSelector: {}
        {{- end }}
      ports:
        {{- if (include "yeti.metrics.frontend" .) }}
        - protocol: TCP
          port: {{ .Values.metrics.frontend.port }}
        {{- end }}
        {{- if (include "yeti.metrics.celery" .) }}
        - protocol: TCP
          port: {{ .Values.metrics.celery.port }}
        {{- end }}
    {{- end }}
  egress:
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Reach in-namespace deps (redis 6379, arangodb 8529, api, bloomcheck).
    - to:
        - podSelector: {}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
