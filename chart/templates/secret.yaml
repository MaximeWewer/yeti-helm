{{- if not .Values.config.existingSecret }}
{{- $name := printf "%s-secret" (include "yeti.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $secret := randAlphaNum 48 -}}
{{- $user := randAlphaNum 20 -}}
{{- if $existing -}}
{{- if hasKey $existing.data "yeti-secret" }}{{- $secret = index $existing.data "yeti-secret" | b64dec -}}{{- end -}}
{{- if hasKey $existing.data "yeti-user" }}{{- $user = index $existing.data "yeti-user" | b64dec -}}{{- end -}}
{{- end }}
# App secret (generated once, preserved across upgrades). Keys:
#   yeti-secret -> YETI_AUTH_SECRET_KEY
#   yeti-user   -> initial 'yeti' admin password
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "yeti.labels" . | nindent 4 }}
type: Opaque
stringData:
  yeti-secret: {{ $secret | quote }}
  yeti-user: {{ $user | quote }}
{{- end }}
{{- if and .Values.arangodb.enabled (not .Values.arangodb.rootPasswordExistingSecret) }}
{{- $aname := printf "%s-arango-root" (include "yeti.fullname" .) -}}
{{- $aexisting := lookup "v1" "Secret" .Release.Namespace $aname -}}
{{- $apassword := randAlphaNum 32 -}}
{{- if and $aexisting (hasKey $aexisting.data "password") -}}
{{- $apassword = index $aexisting.data "password" | b64dec -}}
{{- end }}
---
# Dedicated ArangoDB root secret. The kube-arangodb operator bootstrap reads
# username/password from here (and REQUIRES no other keys). Yeti reads the same
# password as YETI_ARANGODB_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $aname }}
  labels:
    {{- include "yeti.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: "root"
  password: {{ $apassword | quote }}
{{- end }}
