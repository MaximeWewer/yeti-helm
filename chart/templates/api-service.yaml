apiVersion: v1
kind: Service
metadata:
  name: {{ include "yeti.api.fullname" . }}
  labels:
    app.kubernetes.io/component: api
    {{- include "yeti.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/component: api
    {{- include "yeti.selectorLabels" . | nindent 4 }}
