apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yeti.frontend.fullname" . }}
  labels:
    app.kubernetes.io/component: frontend
    {{- include "yeti.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen {{ .Values.frontend.containerPort }};
        root /www;

        location /api/v2 {
            proxy_pass http://{{ include "yeti.api.fullname" . }}:{{ .Values.api.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~(^/docs|^/openapi.json) {
            proxy_pass http://{{ include "yeti.api.fullname" . }}:{{ .Values.api.service.port }};
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
{{- if (include "yeti.metrics.frontend" .) }}

    # stub_status feed for the nginx-prometheus-exporter sidecar. Bound to the
    # pod loopback: unreachable from outside the pod, not on the Service.
    server {
        listen 127.0.0.1:{{ .Values.metrics.frontend.statusPort }};
        access_log off;

        location = /stub_status {
            stub_status;
        }

        location / {
            return 404;
        }
    }
{{- end }}
