# Default values for yeti.
# Quality baseline: MaximeWewer/intelowl-helm. Operator-first deps:
# ArangoDB via kube-arangodb (ArangoDeployment CRD), Redis via CloudPirates chart.

nameOverride: ""
fullnameOverride: ""

# Optional registry prefix applied to all chart-managed images (not the redis subchart).
image:
  registry: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

## Yeti app components. All app containers share the YETI_* env (see _env.tpl).
frontend:
  image:
    repository: yetiplatform/yeti-frontend
    tag: "2.5.1"
    digest: ""
  replicas: 1
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80
  # The stock nginx (yeti-frontend) entrypoint chowns /var/cache/nginx and drops
  # to the nginx user, so it needs CHOWN/SETUID/SETGID. Overrides the global
  # containerSecurityContext for the frontend container only.
  securityContext:
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL
      add:
        - CHOWN
        - SETUID
        - SETGID
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

api:
  image:
    repository: yetiplatform/yeti
    tag: "2.5.1"
    digest: ""
  replicas: 1
  service:
    port: 8000
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Celery worker.
tasks:
  replicas: 1
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Celery events worker (events-tasks).
events:
  enabled: true
  replicas: 1
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Celery beat scheduler (tasks-beat). Singleton — keep replicas at 1.
beats:
  enabled: true
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Yeti agents service (HTTP/WebSocket on :8888, sqlite session store).
# Disabled by default; enabling deploys the workload AND sets [agents] in the config.
agents:
  enabled: false
  image:
    repository: yetiplatform/yeti-agents
    tag: "2.5.1"
    digest: ""
  service:
    port: 8888
  dbPath: /data/sessions.db
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Bloom filter check service (bloomcheck). Only stable on the 'dev' tag upstream.
bloomcheck:
  enabled: true
  image:
    repository: yetiplatform/bloomcheck
    tag: "dev"
    digest: ""
  service:
    port: 8100
  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
    accessModes:
      - ReadWriteOnce
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Shared exports volume (api writes, tasks/events read — RWX recommended).
exports:
  enabled: true
  existingClaim: ""
  storageClass: ""
  size: 5Gi
  accessModes:
    - ReadWriteMany
  mountPath: /opt/yeti/exports

## Yeti application config.
config:
  # Existing Secret with keys: token (ArangoDB root pw), yeti-secret (auth key),
  # yeti-user (initial admin password). If empty, the chart generates them.
  existingSecret: ""
  # Inline secret values — for GitOps/ArgoCD without a secret manager.
  # Under ArgoCD the `lookup`-based generation is unstable: lookup returns empty
  # during the diff/dry-run, so the random fallback regenerates on every sync and
  # the password churns. Setting these makes the secret deterministic and stable.
  # When set, they take precedence over lookup/random (per key). Keep them out of
  # git (e.g. ArgoCD plugin / values override), or use config.existingSecret.
  secrets:
    yetiSecret: "" # -> yeti-secret  (YETI_AUTH_SECRET_KEY)
    yetiUser: "" # -> yeti-user    (initial 'yeti' admin password)
    arangoPassword: "" # -> password     (ArangoDB root, YETI_ARANGODB_PASSWORD)
  imagePullPolicy: IfNotPresent
  # Raw yeti.conf (INI, à la https://github.com/yeti-platform/yeti/blob/main/yeti.conf.sample).
  # When set, an initContainer MERGES it (key-by-key, via Python's configparser —
  # the same parser Yeti uses) over a base yeti.conf generated from config.*, and
  # mounts the result at /app/yeti.conf on api/tasks/events/beats/agents.
  #
  # The base covers ALL core sections, generated from config.*: [system] [auth]
  # [rbac] [tag] [arangodb] [redis] [bloom] [events] [agents] [chromadb] [proxy].
  # Precedence: config.yetiConf > config.* (this file overrides the structured
  # values). The chart stops emitting the YETI_* env for these when yetiConf is
  # set, so the merged file is authoritative. Any extra section you add (feeds
  # [vt]/[otx]/[misp_1]..., [dfiq], [github], [datadog], ...) is merged in as-is.
  # A partial file is fine — omitted keys keep the config.* base values.
  #
  # SECRETS stay env-managed and always win — NOT overridable here (must not live
  # in a ConfigMap): ArangoDB password, auth SECRET_KEY, user password,
  # [timesketch] & [oidc] credentials. Prefer extraEnvFrom (Secret) for API keys
  # rather than plaintext in this file.
  yetiConf: ""
  # Example — override a managed section AND add feeds:
  #   yetiConf: |
  #     [rbac]
  #     enabled = True
  #     [tag]
  #     default_tag_expiration = 90
  #     [vt]
  #     key = YOUR_VT_KEY
  #     [misp]
  #     instances = misp_1
  #     [misp_1]
  #     url = https://misp.example.com
  #     key = MISP_AUTH_KEY
  # Image used by the merge-yeti-conf initContainer (needs Python stdlib only).
  confMergeImage: "python:3.14-alpine"
  # Create the default 'yeti' admin user on first install (password = yeti-user secret).
  createUser: true
  # Init container with nslookup/wget to gate startup on deps.
  initDependencyCheck:
    image: "busybox:1.36"
  auth:
    enabled: true
    accessTokenExpireMinutes: 10000
    browserTokenExpireMinutes: 43200
  # [system] settings — rendered into the generated base yeti.conf (essential
  # block, always present; overridable via config.yetiConf). webroot is derived
  # from ingress when enabled.
  system:
    # Export storage path. Local path (PVC) OR an S3 URI "s3://bucket/prefix"
    # (provide AWS_* credentials via extraEnvFrom; requires the s3 extra in the image).
    exportPath: "/opt/yeti/exports"
    # Yeti plugins directory (relative to /app).
    pluginsPath: "./plugins"
    # User-activity + audit log paths.
    logging: "/var/log/yeti_user_activity.log"
    auditLogfile: "/var/log/yeti_audit.log"
    # Export templates dir (*.jinja2). Must be shared by api + tasks.
    templateDir: "/opt/yeti/templates"
  # [rbac] Role-based access control. Disabled upstream by default (all users full
  # access). Recommended ON for shared/hardened deployments.
  rbac:
    enabled: false
    defaultGlobalRole: "writer" # writer | reader
    defaultAcls: "All users" # "All users" | "none"
  # [tag] tag settings. Empty = tags never expire (upstream default). Value in days.
  tag:
    defaultExpiration: ""
  # [chromadb] local storage path (embeddings store).
  chromadb:
    path: "/data/chromadb"
  # [events] events worker tuning.
  events:
    memoryLimit: 64 # MiB for the events queue
    keepRatio: 0.9
    consumersConcurrency: 2
  # [proxy] outbound proxy for feed fetching (socks5://user:pass@host:port or http://).
  proxy:
    http: ""
    https: ""
  # [timesketch] integration (optional; Timesketch is backlog in this stack).
  timesketch:
    enabled: false
    endpoint: ""
    existingSecret: ""
    usernameKey: "timesketch-user"
    passwordKey: "timesketch-password"
  # OIDC (Yeti supports OIDC via discovery URL; default config targets Google).
  oidc:
    enabled: false
    discoveryUrl: "https://example.com/.well-known/openid-configuration"
    allowedExtraAudiences: ""
    # Secret with keys: client-id, client-secret.
    existingSecret: ""

## ArangoDB via kube-arangodb operator (the operator + CRDs must be installed).
arangodb:
  enabled: true
  database: yeti
  # Existing Secret (keys: username, password — and NO other keys, the operator
  # rejects extra keys) for the ArangoDB root. If empty, the chart generates one.
  rootPasswordExistingSecret: ""
  image: "arangodb/arangodb:3.11.8"
  # Single mode: one writable node (Yeti datastore). Cluster mode is out of scope.
  mode: Single
  # Override detected memory (bytes); set slightly below the pod memory request.
  overrideDetectedTotalMemory: ""
  persistence:
    storageClass: ""
    size: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

## Redis (CloudPirates subchart) — Celery broker. Yeti has no Redis auth support,
## so auth is disabled; the broker is protected by NetworkPolicy instead.
redis:
  enabled: true
  auth:
    enabled: false
    # Subchart default is true: it injects REDIS_PASSWORD into the metrics
    # exporter from the auth Secret — which does not exist with auth disabled,
    # so the sidecar would fail with CreateContainerConfigError. Keep false.
    metrics: false
  persistence:
    enabled: true
    size: 2Gi

## Point Yeti at an external Redis instead of the subchart (sets redis.enabled=false).
externalRedis:
  host: ""
  port: 6379

## Prometheus metrics.
## Yeti exposes NO Prometheus endpoint of its own: neither the api (FastAPI),
## the Celery workers, the agents service nor bloomcheck (Go) ship a /metrics
## route — upstream only has a push-based Datadog *events* plugin. The chart
## therefore wires exporters around the stack:
##   frontend -> nginx stub_status + nginx-prometheus-exporter sidecar (:9113)
##               (covers the whole UI + /api/v2 proxy traffic: rps, status, conns)
##   celery   -> celery-exporter Deployment plugged on the Redis broker (:9808)
##               (task/worker/queue metrics for the `tasks` worker)
##   arangodb -> native ArangoDB metrics, turned on via ArangoDeployment (:9101)
##   redis    -> owned by the subchart: set redis.metrics.enabled=true
##               (and redis.metrics.serviceMonitor.enabled=true)
## api / agents / bloomcheck / events have no exporter: nothing to scrape
## upstream, and no meaningful proxy for it beyond the frontend exporter.
metrics:
  # Master switch — nothing below is rendered unless this is true.
  enabled: false
  # Prometheus Operator ServiceMonitors for the chart-managed exporters.
  # Requires the monitoring.coreos.com CRDs.
  serviceMonitor:
    enabled: false
    # Namespace to create the ServiceMonitors in (default: the release namespace).
    namespace: ""
    interval: 30s
    scrapeTimeout: ""
    # Extra labels — required when Prometheus uses a serviceMonitorSelector
    # (e.g. `release: kube-prometheus-stack`).
    labels: {}
    annotations: {}
    honorLabels: false
    relabelings: []
    metricRelabelings: []
  # prometheus.io/{scrape,port,path} annotations on the exporter Services, for
  # annotation-based scraping (no Prometheus Operator).
  scrapeAnnotations: false
  # nginx frontend metrics: adds a pod-local stub_status listener to the
  # chart-managed nginx conf and an exporter sidecar next to it.
  frontend:
    enabled: true
    image:
      repository: nginx/nginx-prometheus-exporter
      tag: "1.4.2"
      digest: ""
    # Exporter port (the scrape target).
    port: 9113
    # Extra nginx listener serving stub_status, bound to 127.0.0.1 in the pod.
    statusPort: 8081
    resources: {}
  # Celery metrics via danihodovic/celery-exporter, connected to the broker.
  celery:
    enabled: true
    image:
      repository: danihodovic/celery-exporter
      tag: "0.12.2"
      digest: ""
    port: 9808
    # Celery only emits task events when the worker runs with `-E`, and the
    # upstream `tasks` entrypoint does not. When true the chart replaces the
    # `tasks` command with the same celery invocation plus `-E`. Set to false to
    # keep the stock entrypoint: worker/queue metrics still work, per-task ones
    # (celery_task_*) do not.
    workerTaskEvents: true
    # Extra celery-exporter flags, e.g. ["--queues=celery"].
    extraArgs: []
    resources: {}
  # Native ArangoDB metrics (ArangoDeployment spec.metrics — the operator adds
  # an exporter sidecar). TLS is off to match the TLS-less deployment.
  arangodb:
    enabled: true
    port: 9101
  networkPolicy:
    # Peers allowed to reach the metrics ports (e.g. the Prometheus namespace).
    # Standard NetworkPolicyPeer items. Empty = in-namespace peers only.
    allowedFrom: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

## Pod-level security context. fsGroup lets non-root write the exports PVC.
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
  # Enable after verifying the yeti image runs as a non-root uid (see README).
  runAsNonRoot: false

## Container-level security context (hardened; mirrors the OSDFIR baseline + more).
containerSecurityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: yeti.example.com
  tls: []

networkPolicy:
  enabled: true
  # Sources allowed to reach the frontend (e.g. ingress controller namespace).
  # Each item is a standard NetworkPolicyPeer. Empty = only in-namespace peers.
  frontendAllowedFrom: []
  extraEgress: []

podDisruptionBudget:
  enabled: false
  minAvailable: ""
  maxUnavailable: ""

# Extra env appended to all Yeti app containers.
extraEnv: []

# envFrom sources (Secrets/ConfigMaps) for all Yeti app containers. Use this for
# feed/integration API keys (VT, OTX, Shodan, Censys, AbuseIPDB, DNSDB, MISP_*),
# proxy credentials, AWS S3 export credentials (AWS_ACCESS_KEY_ID/...), datadog,
# github token, etc. Yeti maps env YETI_<SECTION>_<KEY> to yeti.conf.
# Example:
#   extraEnvFrom:
#     - secretRef:
#         name: yeti-feeds
extraEnvFrom: []
